version: '3.8'

services:
  # Neo4j Graph Database
  neo4j:
    image: neo4j:5.15-community
    container_name: research-nexus-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc", "gds"]  # APOC and Graph Data Science
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - research-nexus-network

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: research-nexus-qdrant
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - research-nexus-network

  # FastAPI Backend (optional - can run locally)
  # Uncomment to run backend in Docker
  # backend:
  #   build: .
  #   container_name: research-nexus-backend
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     - NEO4J_URI=bolt://neo4j:7687
  #     - NEO4J_USER=neo4j
  #     - NEO4J_PASSWORD=password
  #     - QDRANT_HOST=qdrant
  #     - QDRANT_PORT=6333
  #     - OPENAI_API_KEY=${OPENAI_API_KEY}
  #   depends_on:
  #     - neo4j
  #     - qdrant
  #   networks:
  #     - research-nexus-network

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_storage:

networks:
  research-nexus-network:
    driver: bridge
